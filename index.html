<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortuna Talent Scout Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="layout" style="display:none">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">F95</div>
      <div class="brand-text">
        <strong>Fortuna</strong>
        <span>Talent Scout</span>
      </div>
    </div>
    <nav id="nav">
      <a href="#/dashboard" data-route="dashboard">📊 Dashboard</a>
      <a href="#/spieler" data-route="spieler">👥 Spielerdatenbank</a>
      <a href="#/talentpool" data-route="talentpool">⭐ Talentpool</a>
      <a href="#/vergleich" data-route="vergleich">⚖️ Spielervergleich</a>
      <a href="#/probetraining" data-route="probetraining">🏃 Probetraining</a>
      <a href="#/profilsuche" data-route="profilsuche">🔍 Profilsuche</a>
      <div class="nav-section">Live-Daten</div>
      <a href="#/bundesliga" data-route="bundesliga">🇩🇪 Bundesliga (StatsBomb)</a>
    </nav>
    <div class="sidebar-footer">
      <select id="roleSelect" title="Benutzerrolle">
        <option value="Koordinator">Koordinator</option>
        <option value="Scout">Scout</option>
        <option value="Trainer">Trainer</option>
        <option value="Administrator">Administrator</option>
      </select>
      <button class="btn btn-ghost btn-sm" id="resetData">Demodaten zurücksetzen</button>
      <button class="btn btn-ghost btn-sm" onclick="abmelden()" style="color:var(--muted)">↩ Abmelden</button>
      <div class="version">Fortuna Scout · Version 1.0</div>
    </div>
  </aside>
  <main id="main" class="main"></main>
</div>
<div id="modal-root"></div>
<script>
window.addEventListener("error", function(e) {
  document.body.innerHTML = '<div style="padding:30px;font-family:monospace;background:#fff;color:#000">'
    + '<h2 style="color:red">JavaScript-Fehler</h2>'
    + '<p><strong>Nachricht:</strong> ' + e.message + '</p>'
    + '<p><strong>Datei:</strong> ' + (e.filename||'?').split('/').pop() + '</p>'
    + '<p><strong>Zeile:</strong> ' + e.lineno + ', <strong>Spalte:</strong> ' + e.colno + '</p>'
    + '</div>';
});
</script>
<script src="data.js"></script>
<script src="statsbomb.js"></script>
<script src="app.js"></script>
</body>
</html>
